<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Basic HTML Example">
    <title>My First Webpage</title>
    <style>
        /* Simple CSS styling */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #555;
        }
        a {
            color: #007BFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>This is a basic HTML page with some text, a link, and an image.</p>

    <h2>About</h2>
    <p>HTML stands for <strong>HyperText Markup Language</strong>. It is used to structure web pages.</p>

    <h2>Example Link</h2>
    <p>Visit <a href="https://www.example.com" target="_blank">Example.com</a> for more info.</p>

    <h2>Example Image</h2>
    <img src="https://via.placeholder.com/300" alt="Placeholder Image">

    <h2>List Example</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

</body>
</html>
